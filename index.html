<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Wobbly Man</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        background: #1a1f2e;
        font-family: system-ui, sans-serif;
        /* Safe area support for iPhone notch / home indicator */
        padding: env(safe-area-inset-top, 0px) 0 0 0;
      }
      #game {
        width: 100%;
        height: 100%;
        /* Landscape: fill the full screen width */
      }
      canvas {
        display: block;
        touch-action: none;
        /* Ensure canvas is crisp on high-DPI displays */
        image-rendering: auto;
      }
      /* Landscape orientation: maximize canvas real estate */
      @media (orientation: landscape) {
        html, body { padding: 0; }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
